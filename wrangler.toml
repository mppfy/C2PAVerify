name = "c2pa-verify"
main = "src/index.ts"
compatibility_date = "2025-01-15"
compatibility_flags = ["nodejs_compat"]
account_id = "592f29d8cf4b0b3492112569d9499309"  # mppfy.project@gmail.com

# WASM modules — c2pa-rs verification engine (7.5 MB raw).
# Workers bundler компилирует .wasm → WebAssembly.Module, доступный через default import.
[[rules]]
type = "CompiledWasm"
globs = ["**/*.wasm"]
fallthrough = true

# CAI trust list artifacts embedded as text modules — see src/c2pa/trust/.
[[rules]]
type = "Text"
globs = ["**/*.pem", "**/*.cfg"]
fallthrough = true

# Default (local dev) bindings — override per env below.
# Local dev reuses staging D1/KV по умолчанию (safe — dev mode adapter no-op'ит payments).
[vars]
ENVIRONMENT = "development"
PAYMENT_MODE = "dev"  # dev | mpp | x402 | multi
# x402 config (used when PAYMENT_MODE ∈ {x402, multi}). Local dev = no real
# payments (PAYMENT_MODE=dev), так что эти значения noop для локального wrangler dev.
# DEFAULT_PROTOCOL controls which protocol picks up requests that have no
# wire signal — flip 'mpp' → 'x402' after 7 days of clean prod shadow traffic.
DEFAULT_PROTOCOL = "mpp"
X402_NETWORK = "base-sepolia"

[[d1_databases]]
binding = "DB"
database_name = "c2pa-verify-staging"
database_id = "3334a7dc-b09e-4238-9358-69528e538178"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "CACHE"
id = "8bb1c1f02273438c87be4b4649bfb0a1"

[[analytics_engine_datasets]]
binding = "METRICS"
dataset = "c2pa_verify_calls"

# ─── STAGING ────────────────────────────────────────────────
[env.staging]
name = "c2pa-verify-staging"
# custom_domain=true — wrangler auto-creates DNS record on first deploy.
# Alternative (old): route = { pattern = "c2pa-staging.mppfy.com/*", zone_name = "mppfy.com" }
# требует manual DNS record — у нас его не было, fix: перешли на custom_domain.
routes = [
  { pattern = "c2pa-staging.mppfy.com", custom_domain = true }
]

[env.staging.vars]
ENVIRONMENT = "staging"
# multi = dual protocol (MPP + x402). Staging validates x402 against Base
# Sepolia before production cutover.
PAYMENT_MODE = "multi"
# During shadow rollout: MPP is the default when no protocol hint is present.
# Flip to "x402" after 7 days of clean prod traffic + customer signal.
DEFAULT_PROTOCOL = "mpp"
# x402 on Base Sepolia testnet — free facilitator, testnet USDC.
# X402_RECIPIENT_ADDRESS falls back to MPP_RECIPIENT_ADDRESS when unset.
X402_NETWORK = "base-sepolia"
X402_FACILITATOR_URL = "https://x402.org/facilitator"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "c2pa-verify-staging"
database_id = "3334a7dc-b09e-4238-9358-69528e538178"
migrations_dir = "migrations"

[[env.staging.kv_namespaces]]
binding = "CACHE"
id = "8bb1c1f02273438c87be4b4649bfb0a1"

[[env.staging.analytics_engine_datasets]]
binding = "METRICS"
dataset = "c2pa_verify_calls_staging"

# ─── PRODUCTION ─────────────────────────────────────────────
# Resources создадим отдельно при production deploy (W3-W4).
[env.production]
name = "c2pa-verify"
routes = [
  { pattern = "c2pa.mppfy.com", custom_domain = true }
]

[env.production.vars]
ENVIRONMENT = "production"
# Shadow rollout plan (see docs/v2-decide-api.md и commit message для x402):
#  Stage 1 (shipped): PAYMENT_MODE="mpp", discovery advertises MPP only.
#  Stage 2 (CURRENT): PAYMENT_MODE="multi", DEFAULT_PROTOCOL="mpp".
#    MPP clients keep working unchanged. x402 clients (X-PAYMENT header)
#    get served on Base mainnet. Flip DEFAULT_PROTOCOL="x402" after 7 days
#    of clean traffic + if customer/agent signal appears.
#  Stage 3 (+7 days, no incidents): DEFAULT_PROTOCOL="x402". MPP stays as fallback.
PAYMENT_MODE = "multi"
DEFAULT_PROTOCOL = "mpp"
X402_NETWORK = "base"
# PayAI facilitator (free, public, supports Bazaar auto-catalog на первом
# реальном платеже). Switched from x402.org (no catalog) чтобы попасть в
# discovery для demand research. 100+ сервисов уже в каталоге по состоянию
# на 2026-04. If PayAI добавит рейт-лимиты или проблемы — fallback: вернуть
# "https://x402.org/facilitator" (verify/settle работает, catalog нет).
# CDP facilitator (требует API key) добавим когда/если PayAI даст сигнал.
X402_FACILITATOR_URL = "https://facilitator.payai.network"

[[env.production.d1_databases]]
binding = "DB"
database_name = "c2pa-verify-prod"
database_id = "94961938-afb2-4d72-b264-c0956316223a"
migrations_dir = "migrations"

[[env.production.kv_namespaces]]
binding = "CACHE"
id = "f592002e5b1b44a299ab4fec2901a1fc"

[[env.production.analytics_engine_datasets]]
binding = "METRICS"
dataset = "c2pa_verify_calls_prod"

# Secrets (set via `wrangler secret put NAME --env <env>`):
#   MPP_RECIPIENT_ADDRESS   — Tempo wallet 0x...
#   MPP_SECRET_KEY          — 32-byte base64 (challenge signing)
#   TEMPO_WALLET_PRIVATE_KEY — optional for fee-sponsorship
#   X402_RECIPIENT_ADDRESS  — Base EOA 0x... (optional; defaults to MPP_RECIPIENT_ADDRESS
#                             — same 0x address works across Tempo and Base because both
#                             are EVM. Override only if wallet separation is desired.)
