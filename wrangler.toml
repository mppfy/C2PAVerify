name = "c2pa-verify"
main = "src/index.ts"
compatibility_date = "2025-01-15"
compatibility_flags = ["nodejs_compat"]

# Default (local dev) bindings — override per env below.
[vars]
ENVIRONMENT = "development"
PAYMENT_MODE = "dev"  # dev | mpp

# D1 database for observability logs (service_calls).
# Uncomment + fill IDs after running `wrangler d1 create c2pa-verify`.
# [[d1_databases]]
# binding = "DB"
# database_name = "c2pa-verify"
# database_id = "TODO-local-id"
# migrations_dir = "migrations"

# KV namespace for caching verification results (optional).
# [[kv_namespaces]]
# binding = "CACHE"
# id = "TODO-local-id"

# Analytics Engine for metrics.
# [[analytics_engine_datasets]]
# binding = "METRICS"
# dataset = "c2pa_verify_calls"

# ─── STAGING ────────────────────────────────────────────────
[env.staging]
name = "c2pa-verify-staging"
route = { pattern = "c2pa-staging.mppfy.com/*", zone_name = "mppfy.com" }

[env.staging.vars]
ENVIRONMENT = "staging"
PAYMENT_MODE = "dev"  # flip to "mpp" after Tempo wallet wired + secrets set

# [[env.staging.d1_databases]]
# binding = "DB"
# database_name = "c2pa-verify-staging"
# database_id = "TODO-staging-id"
# migrations_dir = "migrations"

# ─── PRODUCTION ─────────────────────────────────────────────
[env.production]
name = "c2pa-verify"
route = { pattern = "c2pa.mppfy.com/*", zone_name = "mppfy.com" }

[env.production.vars]
ENVIRONMENT = "production"
PAYMENT_MODE = "mpp"

# Secrets (set via `wrangler secret put NAME --env <env>`):
#   MPP_RECIPIENT_ADDRESS   — Tempo wallet 0x...
#   MPP_SECRET_KEY          — 32-byte base64 (challenge signing)
#   TEMPO_WALLET_PRIVATE_KEY — optional for fee-sponsorship
