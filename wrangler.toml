name = "c2pa-verify"
main = "src/index.ts"
compatibility_date = "2025-01-15"
compatibility_flags = ["nodejs_compat"]
account_id = "592f29d8cf4b0b3492112569d9499309"  # mppfy.project@gmail.com

# WASM modules — c2pa-rs verification engine (7.5 MB raw).
# Workers bundler компилирует .wasm → WebAssembly.Module, доступный через default import.
[[rules]]
type = "CompiledWasm"
globs = ["**/*.wasm"]
fallthrough = true

# CAI trust list artifacts embedded as text modules — see src/c2pa/trust/.
[[rules]]
type = "Text"
globs = ["**/*.pem", "**/*.cfg"]
fallthrough = true

# Legal docs (ToS, Privacy) embedded as text modules — served verbatim at
# /legal/*. Scoped to `**/legal/*.md` so unrelated .md files (READMEs, docs)
# stay out of the worker bundle. See src/legal.ts.
[[rules]]
type = "Text"
globs = ["**/legal/*.md"]
fallthrough = true

# Default (local dev) bindings — override per env below.
# Local dev reuses staging D1/KV по умолчанию (safe — dev mode adapter no-op'ит payments).
[vars]
ENVIRONMENT = "development"
PAYMENT_MODE = "dev"  # dev | mpp | x402 | multi
# x402 config (used when PAYMENT_MODE ∈ {x402, multi}). Local dev = no real
# payments (PAYMENT_MODE=dev), так что эти значения noop для локального wrangler dev.
# DEFAULT_PROTOCOL controls which protocol picks up requests that have no
# wire signal — flip 'mpp' → 'x402' after 7 days of clean prod shadow traffic.
DEFAULT_PROTOCOL = "mpp"
X402_NETWORK = "base-sepolia"

[[d1_databases]]
binding = "DB"
database_name = "c2pa-verify-staging"
database_id = "3334a7dc-b09e-4238-9358-69528e538178"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "CACHE"
id = "8bb1c1f02273438c87be4b4649bfb0a1"

[[analytics_engine_datasets]]
binding = "METRICS"
dataset = "c2pa_verify_calls"

# ─── STAGING ────────────────────────────────────────────────
[env.staging]
name = "c2pa-verify-staging"
# custom_domain=true — wrangler auto-creates DNS record on first deploy.
# Alternative (old): route = { pattern = "c2pa-staging.mppfy.com/*", zone_name = "mppfy.com" }
# требует manual DNS record — у нас его не было, fix: перешли на custom_domain.
routes = [
  { pattern = "c2pa-staging.mppfy.com", custom_domain = true }
]

[env.staging.vars]
ENVIRONMENT = "staging"
# multi = dual protocol (MPP + x402). Staging validates x402 against Base
# Sepolia before production cutover.
PAYMENT_MODE = "multi"
# During shadow rollout: MPP is the default when no protocol hint is present.
# Flip to "x402" after 7 days of clean prod traffic + customer signal.
DEFAULT_PROTOCOL = "mpp"
# x402 on Base Sepolia testnet — free facilitator, testnet USDC.
# X402_RECIPIENT_ADDRESS falls back to MPP_RECIPIENT_ADDRESS when unset.
X402_NETWORK = "base-sepolia"
# Pool mode: comma-separated list, `url|label` per entry. Round-robin across
# primaries; sticky verify↔settle (settle NEVER uses fallback — state lives
# on the primary that verified). src/_vendor/adapters/x402-facilitator.ts.
# Staging uses only x402.org (Sepolia). CDP is mainnet-only → no point
# adding for testnet. Pool of 1 is valid and exercises pool code path.
X402_FACILITATOR_URLS = "https://x402.org/facilitator|x402-public"
# Axiom structured logs (Free/Personal tier — 500 GB/mo). AXIOM_TOKEN = secret.
AXIOM_DATASET = "c2pa-verify"
AXIOM_ORG_ID = "mppfy-r2a9"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "c2pa-verify-staging"
database_id = "3334a7dc-b09e-4238-9358-69528e538178"
migrations_dir = "migrations"

[[env.staging.kv_namespaces]]
binding = "CACHE"
id = "8bb1c1f02273438c87be4b4649bfb0a1"

[[env.staging.analytics_engine_datasets]]
binding = "METRICS"
dataset = "c2pa_verify_calls_staging"

# ─── PRODUCTION ─────────────────────────────────────────────
# Resources создадим отдельно при production deploy (W3-W4).
[env.production]
name = "c2pa-verify"
routes = [
  { pattern = "c2pa.mppfy.com", custom_domain = true },
  # Apex + www serve the marketing landing (src/landing.ts). Worker
  # branches on Host header in the GET / handler. Keep both zones in
  # Cloudflare DNS pointing to a proxied (orange cloud) AAAA record so
  # the Worker route matches.
  { pattern = "mppfy.com", custom_domain = true },
  { pattern = "www.mppfy.com", custom_domain = true }
]

[env.production.vars]
ENVIRONMENT = "production"
# Shadow rollout plan (see docs/v2-decide-api.md и commit message для x402):
#  Stage 1 (shipped): PAYMENT_MODE="mpp", discovery advertises MPP only.
#  Stage 2 (CURRENT): PAYMENT_MODE="multi", DEFAULT_PROTOCOL="mpp".
#    MPP clients keep working unchanged. x402 clients (X-PAYMENT header)
#    get served on Base mainnet. Flip DEFAULT_PROTOCOL="x402" after 7 days
#    of clean traffic + if customer/agent signal appears.
#  Stage 3 (+7 days, no incidents): DEFAULT_PROTOCOL="x402". MPP stays as fallback.
PAYMENT_MODE = "multi"
DEFAULT_PROTOCOL = "mpp"
X402_NETWORK = "base"
# Pool mode: multiple facilitators, round-robin, sticky verify↔settle.
#   - PayAI (free, public): Bazaar auto-catalog на первом реальном платеже.
#     100+ сервисов в каталоге. Дал самый чистый путь для demand research.
#   - CDP (Coinbase Developer Platform): требует JWT auth через
#     X402_CDP_API_KEY_ID/SECRET. Добавляет Bazaar listing в Coinbase
#     экосистеме + enterprise reliability. Если CDP credentials не
#     сетованы — вызовы туда будут unauthenticated и упадут, но другие
#     primaries будут работать. Set secrets via:
#       wrangler secret put X402_CDP_API_KEY_ID --env production
#       wrangler secret put X402_CDP_API_KEY_SECRET --env production
# Pool-level fallback = x402.org (no catalog, no auth, всегда доступен) —
# добавляется автоматически в buildFacilitatorPool() если не дублирует
# primary. См. src/index.ts::buildFacilitatorPool.
X402_FACILITATOR_URLS = "https://facilitator.payai.network|payai,https://api.cdp.coinbase.com/platform/v2/x402|cdp"
# Seed payer — наш собственный кошелёк для bootstrap-платежа, который
# триггерит auto-list в PayAI Bazaar. verify() пометит metadata.source="seed"
# для фильтрации при анализе органического трафика.
X402_SEED_PAYERS = "0x30A4E38Fc66e87F8280A74b15485603aC7145568"
# Axiom structured logs (Free/Personal tier — 500 GB/mo). AXIOM_TOKEN = secret.
AXIOM_DATASET = "c2pa-verify"
AXIOM_ORG_ID = "mppfy-r2a9"

[[env.production.d1_databases]]
binding = "DB"
database_name = "c2pa-verify-prod"
database_id = "94961938-afb2-4d72-b264-c0956316223a"
migrations_dir = "migrations"

[[env.production.kv_namespaces]]
binding = "CACHE"
id = "f592002e5b1b44a299ab4fec2901a1fc"

[[env.production.analytics_engine_datasets]]
binding = "METRICS"
dataset = "c2pa_verify_calls_prod"

# Secrets (set via `wrangler secret put NAME --env <env>`):
#   MPP_RECIPIENT_ADDRESS   — Tempo wallet 0x...
#   MPP_SECRET_KEY          — 32-byte base64 (challenge signing)
#   TEMPO_WALLET_PRIVATE_KEY — optional for fee-sponsorship
#   X402_RECIPIENT_ADDRESS  — Base EOA 0x... (optional; defaults to MPP_RECIPIENT_ADDRESS
#                             — same 0x address works across Tempo and Base because both
#                             are EVM. Override only if wallet separation is desired.)
#   X402_CDP_API_KEY_ID     — Coinbase Developer Platform API key ID (production only).
#                             Get at https://portal.cdp.coinbase.com/access/api.
#                             Without this, CDP facilitator calls will be unauthenticated
#                             and rejected — other primaries in the pool keep working.
#   X402_CDP_API_KEY_SECRET — CDP API key secret (PEM EC or base64 Ed25519).
#                             Signed JWT via @coinbase/cdp-sdk auth at call time.
