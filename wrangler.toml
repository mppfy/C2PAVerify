name = "c2pa-verify"
main = "src/index.ts"
compatibility_date = "2025-01-15"
compatibility_flags = ["nodejs_compat"]
account_id = "592f29d8cf4b0b3492112569d9499309"  # mppfy.project@gmail.com

# WASM modules — c2pa-rs verification engine (7.5 MB raw).
# Workers bundler компилирует .wasm → WebAssembly.Module, доступный через default import.
[[rules]]
type = "CompiledWasm"
globs = ["**/*.wasm"]
fallthrough = true

# CAI trust list artifacts embedded as text modules — see src/c2pa/trust/.
[[rules]]
type = "Text"
globs = ["**/*.pem", "**/*.cfg"]
fallthrough = true

# Default (local dev) bindings — override per env below.
# Local dev reuses staging D1/KV по умолчанию (safe — dev mode adapter no-op'ит payments).
[vars]
ENVIRONMENT = "development"
PAYMENT_MODE = "dev"  # dev | mpp

[[d1_databases]]
binding = "DB"
database_name = "c2pa-verify-staging"
database_id = "3334a7dc-b09e-4238-9358-69528e538178"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "CACHE"
id = "8bb1c1f02273438c87be4b4649bfb0a1"

[[analytics_engine_datasets]]
binding = "METRICS"
dataset = "c2pa_verify_calls"

# ─── STAGING ────────────────────────────────────────────────
[env.staging]
name = "c2pa-verify-staging"
# custom_domain=true — wrangler auto-creates DNS record on first deploy.
# Alternative (old): route = { pattern = "c2pa-staging.mppfy.com/*", zone_name = "mppfy.com" }
# требует manual DNS record — у нас его не было, fix: перешли на custom_domain.
routes = [
  { pattern = "c2pa-staging.mppfy.com", custom_domain = true }
]

[env.staging.vars]
ENVIRONMENT = "staging"
PAYMENT_MODE = "mpp"  # staging uses real MPP protocol (dev mode только для local wrangler dev)

[[env.staging.d1_databases]]
binding = "DB"
database_name = "c2pa-verify-staging"
database_id = "3334a7dc-b09e-4238-9358-69528e538178"
migrations_dir = "migrations"

[[env.staging.kv_namespaces]]
binding = "CACHE"
id = "8bb1c1f02273438c87be4b4649bfb0a1"

[[env.staging.analytics_engine_datasets]]
binding = "METRICS"
dataset = "c2pa_verify_calls_staging"

# ─── PRODUCTION ─────────────────────────────────────────────
# Resources создадим отдельно при production deploy (W3-W4).
[env.production]
name = "c2pa-verify"
routes = [
  { pattern = "c2pa.mppfy.com", custom_domain = true }
]

[env.production.vars]
ENVIRONMENT = "production"
PAYMENT_MODE = "mpp"

[[env.production.d1_databases]]
binding = "DB"
database_name = "c2pa-verify-prod"
database_id = "94961938-afb2-4d72-b264-c0956316223a"
migrations_dir = "migrations"

[[env.production.kv_namespaces]]
binding = "CACHE"
id = "f592002e5b1b44a299ab4fec2901a1fc"

[[env.production.analytics_engine_datasets]]
binding = "METRICS"
dataset = "c2pa_verify_calls_prod"

# Secrets (set via `wrangler secret put NAME --env <env>`):
#   MPP_RECIPIENT_ADDRESS   — Tempo wallet 0x...
#   MPP_SECRET_KEY          — 32-byte base64 (challenge signing)
#   TEMPO_WALLET_PRIVATE_KEY — optional for fee-sponsorship
